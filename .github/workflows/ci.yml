name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    env:
      # Local SQLite datasource is enough for lint/typecheck/test/build.
      DATABASE_URL: "file:./prisma/dev.db"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Prisma schema parity (sqlite vs postgres)
        run: npm run check:schema

      - name: Generate Prisma client and create local DB
        run: npm run db:apply

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
